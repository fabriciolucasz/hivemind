<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hivemind - Verificar Código</title>
    <link rel="stylesheet" href="enviar-codigo.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="login-container">
        <header>
            <img src="icone.png" alt="Logo Hivemind" class="logo">
            <h1>Hivemind</h1> <p>Verifique seu email</p>
        </header>

        <div class="card">
            <h2>Digite o código</h2>
            <p class="description">
                Enviamos um código de 6 dígitos para:<br>
                <strong>usuario@email.com</strong>
            </p>
            <p class="instructions">Digite o código abaixo para continuar com a redefinição de senha.</p>

            <form id="verifyCodeForm">
                <div class="input-group">
                    <label for="code">Código de verificação</label>
                    <div class="input-wrapper">
                        <i data-lucide="key" class="input-icon"></i>
                        <input type="text" id="code" name="code" placeholder="000000" maxlength="6" required>
                    </div>
                </div>

                <button type="submit" class="btn-primary">Verificar código</button>
            </form>

            <div class="resend-section">
                <p>Não recebeu o código? <a href="#" class="resend-link">Reenviar código</a></p>
            </div>

            <div class="back-link">
                <a href="esqueceu-senha.html">
                    <i data-lucide="arrow-left"></i>
                    Voltar
                </a>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="assets\js\api.js"></script>
    <script src="enviar-codigo.js"></script>

    <script>lucide.createIcons();</script>
</body>
</html>
