<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hivemind - Onboarding</title>
    <link rel="stylesheet" href="onboarding.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="login-container">
        <header>
            <img src="icone-onboarding.png" alt="Logo Onboarding" class="logo">
            <h1>Vamos começar sua jornada!</h1>
            <p>Conte-nos um pouco sobre você para personalizarmos sua experiência</p>
        </header>

        <form id="onboardingForm">
            <div class="input-group">
                <label for="nome">Nome completo</label>
                <div class="input-wrapper">
                    <i data-lucide="user" class="input-icon"></i>
                    <input type="text" id="nome" name="nome" placeholder="Como você gostaria de ser chamado?" required>
                </div>
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label for="idade">Idade</label>
                    <div class="input-wrapper">
                        <i data-lucide="calendar" class="input-icon"></i>
                        <input type="number" id="idade" name="idade" placeholder="15" required>
                    </div>
                </div>
                <div class="input-group">
                    <label for="ano-escolar">Ano escolar</label>
                    <input type="text" id="ano-escolar" name="ano-escolar" placeholder="Ex: 3º ano EM" required>
                </div>
            </div>

            <div class="input-group">
                <label for="interesses">Interesses atuais <small>(opcional)</small></label>
                <textarea id="interesses" name="interesses" placeholder="Ex: Matemática, tecnologia, música, biologia, esportes..."></textarea>
                <span class="info-text">Essas informações ajudarão nossa IA a fornecer recomendações mais precisas.</span>
            </div>

            <div class="button-group">
                <button type="button" class="btn-secondary">Pular</button>
                <button type="submit" class="btn-primary">Começar</button>
            </div>
        </form>

        <div class="privacy-banner">
            <i data-lucide="shield-check"></i>
            <p>Para entender como protegemos e por que coletamos seus dados, acesse nossa <a href="#">Política de Privacidade</a></p>
        </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="assets\js\api.js"></script>
    <script src="onboarding.js"></script>

    <script>lucide.createIcons();</script>
</body>
</html>
