<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hive Mind - Cadastro</title>
    <link rel="stylesheet" href="cadastro.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="login-container">
        <header>
            <img src="icone.png" alt="Logo Hive Mind" class="logo">
            <h1>Bem-vindo ao Hive Mind</h1>
            <p>Crie sua conta e descubra seu caminho profissional</p>
        </header>

        <form id="registerForm">
            <div class="input-group">
                <label for="email">Email</label>
                <div class="input-wrapper">
                    <i data-lucide="mail" class="input-icon"></i>
                    <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                </div>
            </div>

            <div class="input-group">
                <label for="confirmar-email">Confirmar Email</label>
                <div class="input-wrapper">
                    <i data-lucide="mail" class="input-icon"></i>
                    <input type="email" id="confirmar-email" name="confirmar-email" placeholder="Repita o seu e-mail" required>
                </div>
            </div>

            <div class="input-group">
                <label for="senha">Senha</label>
                <div class="input-wrapper">
                    <i data-lucide="lock" class="input-icon"></i>
                    <input type="password" id="senha" name="senha" placeholder="Mínimo 8 caracteres" required>
                    <button type="button" class="toggle-password icon-button">
                        <i data-lucide="eye"></i>
                    </button>
                </div>
            </div>

            <div class="input-group">
                <label for="confirmar-senha">Confirmar Senha</label>
                <div class="input-wrapper">
                    <i data-lucide="lock" class="input-icon"></i>
                    <input type="password" id="confirmar-senha" name="confirmar-senha" placeholder="Digite a senha novamente" required>
                    <button type="button" class="toggle-password icon-button">
                        <i data-lucide="eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-primary">Criar Conta</button>

            <p class="login-text">
                Já tem uma conta? <a href="login.html">Fazer login</a>
            </p>
        </form>

        <footer>
            <p>Ao criar uma conta, você concorda com nossos <a href="#">Termos de Uso</a> e <a href="#">Política de Privacidade</a></p>
        </footer>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="assets\js\api.js"></script>
    <script src="cadastro.js"></script>

    <script>lucide.createIcons();</script>
</body>
</html>
