<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hivemind - Nova Senha</title>
    <link rel="stylesheet" href="nova-senha.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="login-container">
        <header>
            <img src="icone.png" alt="Logo Hivemind" class="logo">
            <h1>Hivemind</h1> <p>Crie uma nova senha</p>
        </header>

        <div class="card">
            <h2>Nova senha</h2>
            <p class="description">Digite sua nova senha. Ela deve ter no mínimo 8 caracteres.</p>

            <form id="newPasswordForm">
                <div class="input-group">
                    <label for="nova-senha">Nova senha</label>
                    <div class="input-wrapper">
                        <input type="password" id="nova-senha" name="nova-senha" placeholder="Digite sua nova senha" required>
                        <button type="button" class="toggle-password icon-button">
                            <i data-lucide="eye"></i>
                        </button>
                    </div>
                </div>

                <div class="input-group">
                    <label for="confirmar-senha">Confirmar senha</label>
                    <div class="input-wrapper">
                        <input type="password" id="confirmar-senha" name="confirmar-senha" placeholder="Digite a senha novamente" required>
                        <button type="button" class="toggle-password icon-button">
                            <i data-lucide="eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-primary">Redefinir senha</button>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="assets\js\api.js"></script>
    <script src="nova-senha.js"></script>
    
    <script>lucide.createIcons();</script>
</body>
</html>
