<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hivemind - Meu Perfil</title>
    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="perfil.css">
</head>
<body>
    <div class="app-container">
        <main class="main-content">
            <header class="content-header">
                <h1>Configurações de <span>Perfil</span></h1>
            </header>

            <div class="perfil-grid">
                <section class="perfil-card">
                    <h3><i data-lucide="user"></i> Dados Pessoais</h3>
                    <form id="form-perfil">
                        <div class="form-group">
                            <label>Nome Completo</label>
                            <input type="text" id="perfil-nome" placeholder="Seu nome">
                        </div>
                        <div class="form-group">
                            <label>E-mail</label>
                            <input type="email" id="perfil-email" disabled>
                            <small>O e-mail não pode ser alterado.</small>
                        </div>
                        <button type="submit" id="btn-atualizar" class="btn-primary">Salvar Alterações</button>
                    </form>
                </section>

                <section class="perfil-card">
                    <h3><i data-lucide="shield-check"></i> Privacidade</h3>
                    <p>Gerencie como seus dados são processados pela IA.</p>
                    <div class="privacy-actions">
                        <button id="btn-exportar" class="btn-outline">
                            <i data-lucide="download"></i> Exportar meus dados (JSON)
                        </button>
                        <button id="btn-limpar-ia" class="btn-outline btn-warning">
                            <i data-lucide="trash"></i> Resetar memória da IA
                        </button>
                    </div>
                </section>

                <section class="perfil-card danger-zone">
                    <h3><i data-lucide="alert-triangle"></i> Zona de Perigo</h3>
                    <p>A exclusão da conta é permanente e apagará todos os seus relatos e notas.</p>
                    <button id="btn-deletar-conta" class="btn-danger">Excluir minha conta</button>
                </section>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../../assets/js/api.js"></script>
    <script src="perfil.js"></script>
</body>
</html>
