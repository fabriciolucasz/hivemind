<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hivemind - Teste Vocacional</title>
    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="teste-vocacional.css">
</head>
<body>
    <div class="app-container">
        <main class="main-content">
            <section id="view-start" class="quiz-container">
                <div class="quiz-card intro-card">
                    <i data-lucide="compass" class="icon-xl"></i>
                    <h1>Descubra o seu <span>Caminho</span></h1>
                    <p>Responda a 25 questões sobre as suas preferências e deixe a nossa IA mapear o seu perfil profissional ideal.</p>
                    <button id="btn-iniciar-teste" class="btn-primary">Começar Agora</button>
                </div>
            </section>

            <section id="view-quiz" class="quiz-container hidden">
                <div class="quiz-progress-wrapper">
                    <div class="progress-info">
                        <span>Questão <strong id="current-q">1</strong> de 25</span>
                        <span id="percent-complete">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-bar-fill" style="width: 0%;"></div>
                    </div>
                </div>

                <div class="quiz-card">
                    <h2 id="question-text">A carregar pergunta...</h2>
                    <div class="options-list">
                        </div>
                    
                    <div class="quiz-navigation">
                        <button id="btn-voltar" class="btn-outline" disabled>Voltar</button>
                        <button id="btn-proximo" class="btn-primary" disabled>Próximo</button>
                    </div>
                </div>
            </section>

            <section id="view-loading" class="quiz-container hidden">
                <div class="quiz-card loading-card">
                    <div class="loader-circle"></div>
                    <h2>A processar resultados...</h2>
                    <p>Estamos a enviar as suas respostas para o Mentor IA analisar.</p>
                </div>
            </section>
        </main>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../../assets/js/api.js"></script>
    <script src="teste-vocacional.js"></script>
</body>
</html>
